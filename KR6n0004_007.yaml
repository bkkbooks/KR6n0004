body:
  text: 宋罽賓三藏求那跋摩譯菩薩地助菩提數法餘品第十九云何菩薩摩訶薩陀羅尼陀羅尼有四種一者法陀羅尼二者義陀羅尼三者辭陀羅尼四者忍陀羅尼法陀羅尼者菩薩心得憶念以念力故得大智慧大智力故知諸法界言辭字句堅心受持經無量世無有忘失義陀羅尼者如法陀羅尼隨順解義於無量世受持不忘辭陀羅尼者菩薩摩訶薩為破衆生種種惡故受持神呪讀誦通利利益衆生為呪術故受持五法一者不食肉二者不飲酒三者不食五辛四者不淫五者不淨之家不在中食菩薩具足如是五法能大利益無量衆生諸惡鬼神諸毒諸病無不能治忍陀羅尼者菩薩摩訶薩智慧力故心樂寂靜不與人居默然不語獨處無伴於食知足食一種食坐禪思惟夜不眠寐時佛即以陀羅尼呪教之令誦乙致蜜致羈致毗羼提般檀那莎呵菩薩爾時從佛受已深心觀察知字無義以無義故無有義語若無義語辭亦無義法亦無義以無義故一切諸法悉不可説義者一切諸法無義義也以忍力故了了能知四陀羅尼以了知故則得具足忍陀羅尼以能具足忍陀羅尼故不久得成阿耨多羅三藐三菩提菩薩摩訶薩初阿僧祇劫修集行時得是法義二陀羅尼因此法義二陀羅尼修集三昧因修三昧發誓願故復得辭忍二陀羅尼菩薩若能具足四事得四陀羅尼一者不貪五欲二者於衆生中無嫉妬心三者能施施已無悔四者樂聞正法受持讀誦書寫解説菩薩法藏菩薩摩夷云何菩薩發大誓願有五種一者發心發願二者有發願三者行發願四者善發願五者大發願初發菩提心時名發心發願為利衆生生人天故名有發願為衆生故修無量心名行發願修集一切菩薩善法名善發願不惜身命護持正法名大發願菩薩若以十種供養佛法僧寶護持正法見持法者供養恭敬是名大發願菩薩摩訶薩生兜率天乃至大涅槃是名大發願菩薩摩訶薩從初發心乃至得阿耨多羅三藐三菩提是名大發願菩薩摩訶薩為度衆生遍在諸有隨而受身是名大發願菩薩摩訶薩常以大乘菩薩法藏菩薩摩夷教化衆生是名大發願菩薩摩訶薩凡所演説無不利益無善根者令生善芽是名大發願云何名為菩薩摩訶薩修空三昧菩薩深觀一切諸法有可説性是可説性不可説性中無故名空三昧云何無願三昧菩薩摩訶薩以一切法可宣説故有我有我所有我有我所故則名為苦菩薩摩訶薩破邪想故知一切法不可宣説是故不著我及我所無我無我所故更不願求是名無願三昧云何無相三昧菩薩摩訶薩知一切法不可宣説以不可説故悉無一切煩惱之相以無相故名為寂靜修寂靜故是名無相三昧如來何故説三三昧一切諸法凡有二種一者有為有二者無為有有為有者謂我我所無為有者所謂涅槃有為有者菩薩摩訶薩觀一切苦不生願求是名無願三昧無為有者所謂涅槃菩薩摩訶薩於涅槃中不生樂想是名無想無為者亦有亦無是故菩薩非願非不願菩薩摩訶薩見有有見無無有中無無無中無有是名為空菩薩爾時修空三昧得真實智如是三昧聲聞緣覺亦修亦學而不能説一切諸法不可宣説諸佛菩薩為令衆生得寂靜故説是四法一切有為法無常苦無我涅槃寂靜諸佛菩薩為諸衆生説是四法當知已説一切法界諸法根本是名優陀那優陀那者過去無量一切諸佛亦如是説能作上者名優陀那增長善法名優陀那云何菩薩見有為法悉是無常菩薩摩訶薩知有為法可説無常是故一切有為無常知諸法性真實義中無因果故不可宣説是故作相言一切法悉是生滅以是過去有為亦生亦滅是故過去之法不見有因不見有性以不見因性故説過去法悉是無常現在法知生而不知滅現在之法不見其因見果見性不滅故知性不知因未來有為法不見生滅是故知因不知果不知性以未生故是故菩薩知因不知性爾時觀三世一一念有三相若過一念則有四相先滅法已次第生相似法是名為生生已作事是名為住先滅法相滅法已見相似是名為老生已不住至於二念是名為壞菩薩見有為法相一種如生住老亦如是唯壞相異何以故不共三相住故如是四相見有二種一者有二者無有者三相無者第四相菩薩見有為法不見生不見住不見老不見壞何以故生住老壞無真性故菩薩摩訶薩見色法生色法住色法老色法壞不見生住老壞菩薩摩訶薩以方便觀不見四相方便觀者菩薩觀若離色法別有生者色法生時生亦應生若爾者一切諸法皆應二生一者色生二者生生如是二生若即法若離法若不離者則無生生若言離法別有生者是義不然若不離者爾時色無有生生因緣故生住老壞亦如是若壞自性有者當知是壞亦生亦壞若壞生者當知一切有為之法悉無有滅入滅定時心心數法常應還生色法滅時亦應還生何以故是壞生故是故諸法悉應是常是故菩薩離色法已不見四相知有為法性無常故亦常宣説有為無常菩薩觀見有為之法有三種苦苦苦行苦壞苦是故如來説有為法一切是苦云何菩薩見有為法無我無我者有二種一者衆生無我二者法無我衆生無我者衆生非是有法非是無法非是離有無法是名衆生無我法無我者一切諸法可説可説性無故是名法無我有如是等二種無我是故如來説有為法一切無我如是有為斷現在因障未來因是名涅槃無煩惱結故名寂靜若是菩薩以不淨心觀於涅槃聲聞未得道果觀於涅槃俱亦未實知涅槃性亦是涅槃相譬如大王為子息故刻木造作象馬鹿兔王子亦於非真實象馬作真實想是王或時讚歎象馬諸子各謂讚己象馬其後出舍見真象馬即生慚愧我等云何於非象馬生象馬想云何於此同名同相生真實想如來亦説菩薩心不清淨聲聞之人未證道果住生死舍如來為説涅槃寂靜菩薩聲聞聞已亦生真涅槃想實不能知真涅槃也聞佛説時生心作想言是涅槃其後修集八正道已得淨智慧出生死舍爾乃真實知涅槃性方生慚愧我等云何於非涅槃生涅槃想譬如病人往良醫所爾時良醫為破病故隨病授藥病者得已心生歡喜作真藥想即便服之既服藥已所患雖除更發餘病爾時良醫斷先所服更與餘藥病者復言大師先藥佳良力能治病非是藥能良醫雖説如是藥好而此病者猶故不信爾時病者服藥病差方乃信藥生慚愧心佛説法時亦復如是衆生聞已壞小煩惱即便生於真實之想更起煩惱言佛無常如來復為説甚深法雖復聞之猶不生信以本為實菩薩若得清淨之道爾時方生慚愧之心如來實常我云何言如來無常是故如來説有為法一切無常苦無我等涅槃寂靜菩薩地功德品第二十菩薩摩訶薩修菩提行有五事不可思議一者憐愍一切衆生二者為利衆生受生死苦三者以善方便調伏衆生四者發心欲知甚深難義五者欲知不可思議神足如是五法不與一切衆生共之是故得名不可思議菩薩摩訶薩復有五事不可思議菩薩摩訶薩為利衆生受於苦因以受苦因故得受安樂以受樂故具足成就不思議法復次菩薩觀生死過涅槃寂靜為衆生故不樂涅槃流轉生死是名受樂以受樂故具足成就不思議法復次菩薩樂於空間寂靜默然為諸衆生演説正法是名受樂以受樂故具足成就不思議法復次菩薩摩訶薩為衆生故行六波羅蜜亦復不求六波羅蜜果是名受樂以受樂故具足成就不思議法復次菩薩摩訶薩營他事業如造已務甘心喜樂不辭勤苦是名受樂以受樂故具足成就不思議法是名菩薩五事不可思議法菩薩復有五事於諸衆生其心平等一者初發菩提心時普為一切非為一人是名平等二者菩薩修大悲時普為一切非為一人是名平等三者菩薩修集一子地時普為一切非為一人是名平等四者菩薩普觀十二因緣一切等有是名平等五者菩薩求阿耨多羅三藐三菩提時普為一切非為一人是名平等菩薩摩訶薩復有五事為利衆生一者教修正命二者教習世事方便三者見貧窮者方便教令破貧窮苦四者為上善者説正實道五者為三乘故説三乘法是名五事利益衆生有五事法報菩薩恩一者受持善法一切禁戒二者貧者受已如教修行破於貧窮三者供養三寶四者於菩薩所聞法受持讀誦書寫分別解説轉以教他五者見持法者恭敬供養菩薩摩訶薩行菩提道至心立願常求五事一者常願世間有佛興出二者常願具足六波羅蜜三者常願求覓菩薩法藏菩薩摩夷四者常願當得解脫五者常願眷屬成就是名為五菩薩復有五事利益衆生如自利利他品中説菩薩復有五事疾得阿耨多羅三藐三菩提一者護法二者修行善行三者智慧力四者專心寂靜五者定得菩薩性是名為五護法者菩薩具足護陀羅尼從他聞法速得解了復次菩薩具足護念以護念故受法不忘復次菩薩具護智慧以護智故分別法界復次菩薩具足護心調諸根故復次菩薩具護他心隨他行故是名護法修行善行者菩薩於法順解順説常修善法四無量心願向阿耨多羅三藐三菩提是名善行智慧力者菩薩摩訶薩從初發心乃至得阿耨多羅三藐三菩提是名智慧力專心寂靜者菩薩摩訶薩以十淨法供養如來如上所説是名寂靜定得菩薩性者所謂菩薩住一子地不退轉地是名菩薩定得菩薩性菩薩摩訶薩有五事善法損減一者不能供養於法及説法者二者放逸懈怠三者樂起煩惱心掉不息四者於同菩薩心生憍慢五者於菩薩藏顛倒解義菩薩有五法善法增長一者供養於法及説法者二者攝心精進三者所起煩惱心樂除滅四者於同菩薩心生恭敬五者於菩薩藏隨順解義有五事實非菩薩假名菩薩實非沙門假名沙門非婆羅門假名婆羅門不得菩薩戒不中同止一者惡性二者護毀禁者三者不得禪定示得禪相四者邪命自活五者見有智者生嫉誹謗有五事真名菩薩真名沙門真名婆羅門得菩薩戒得與同止一者善性調和二者治毀禁者三者實得禪定不示其相四者正命自活五者見有智者生喜讚歎菩薩摩訶薩教化衆生有十種一者為破惡法故二者為知法界故三者不作犯故四者犯已慚愧悔故五者調伏諸根故六者不放逸故七者遠離惡知識故八者住寂靜處故九者遠離煩惱故十者得解脫故是名為十授菩薩記有六事一者定有菩薩性未發阿耨多羅三藐三菩提心二者未有菩薩性而發阿耨多羅三藐三菩提心三者有菩薩性亦發阿耨多羅三藐三菩提心四者於無量世為菩提故修行善行五者定得阿耨多羅三藐三菩提不説時定六者定得阿耨多羅三藐三菩提亦説時定是名為六有三事菩薩定得阿耨多羅三藐三菩提一者定有性二者得不退心三者凡所作事悉為衆生生善法芽菩薩以是三定為佛所記菩薩摩訶薩不具五事不得阿耨多羅三藐三菩提一者不發菩提之心二者不得憐愍之心三者不勤精進四者不敬重戒五者不知一切世事菩薩若不具足如是五事不得阿耨多羅三藐三菩提若有説言離是五法得阿耨多羅三藐三菩提者無有是處有五事菩薩常所修集一者不放逸二者為破衆生貧窮困苦三者供養三寶四者至心持戒有犯尋覺五者所作善事悉以回向阿耨多羅三藐三菩提菩薩摩訶薩有十法勝一切法一者菩薩性勝一切性二者初發菩提心勝於一切世間出世間發心三者毗梨耶波羅蜜般若波羅蜜勝於一切諸波羅蜜四者軟語攝法勝於諸攝五者如來勝於一切衆生六者悲心勝於一切無量心七者所修四禪勝一切禪八者空三昧勝一切三昧九者滅盡定勝一切滅定十者淨方便勝一切方便是為十法有四事唯佛菩薩獨能流布非餘沙門婆羅門天魔梵等所能流布若從佛聞則能流布一者法流布二者實流布三者方便流布四者乘流布法流布者次第演説十二部經實流布者有一種謂不妄語復有二種謂世諦第一義諦復有三種相實口實行實復有四種謂苦集滅道復有五種一者因實二者果實三者智實四者知境界實五者無上實復有六種一者實實二者虛妄實三者智實四者遠離實五者證實六者修實復有七種一者愛實二者苦實三者解脫實四者法實五者解實六者聖實七者非聖實復有八種一者行苦實二者苦苦實三者生苦實四者滅實五者煩惱實六者解脫實七者善行實八者善果實復有九種一者無常實二者苦實三者不淨實四者空實五者無我實六者有愛實七者斷愛實八者斷二愛方便實九者有餘涅槃實復有十種一者非分強作苦實二者貧窮苦實三者四大不調苦實四者愛別離苦實五者怨憎會苦實六者業實七者果報實八者煩惱實九者善思惟實十者正見實是為十法名實流布方便流布者如方便品説乘流布者所謂聲聞乘辟支佛乘佛乘是名為四菩薩摩訶薩觀一切方便有五無量一者衆生界無量二者世界無量三者法界無量四者調伏界無量五者調伏方便無量衆生界者有六十一種住喜地菩薩觀衆生界轉為無量世界無量者有無量名故如此世界名為娑婆是故梵天名娑婆主法無量者善不善無記轉為無量調伏無量者有一種謂調伏故復有二種具足煩惱不具煩惱復有三種上中下根復有四種婆羅門剎利毗舍首陀復有五種多貪多瞋多癡多慢多惡覺觀復有六種出家在家未熟已熟未得解脫已得解脫復有七種一者聞已便解二者以譬喻得解三者一句一句解四者一字一字解五者現在熟六者他世熟七者隨因緣熟復有八種所謂八衆復有九種一名如來調伏二聲聞調伏三緣覺調伏四菩薩調伏五難調伏六易調伏七軟語調伏八呵嘖調伏九軟語呵嘖調伏復有十種一者地獄二者畜生三者餓鬼四者欲界人天五者中陰六者色七者非色八者想九者無想十者非想非非想是名十種是五十五種觀作無量衆生界調伏界有何差別衆生界者都不分別有性無性調伏界者分別有性無性調伏方便無量者如初品中説是故菩薩五種無量攝取一切方便菩薩摩訶薩欲知真實當求四事一者推物二者推名三者推性四者推分別如是四事亦如前説諸佛菩薩為衆生説法有五事一者説時即悟四諦二者説時即得解脫三者説時即發阿耨多羅三藐三菩提心四者説時得菩薩羼提五者衆生聞已受持讀誦書寫解説護持正法是名諸佛菩薩為衆生説法得大功德不可思議云何名大乘有七事大故名大乘一者法大法大者菩薩法藏於十二部經最大最上故名毗佛略二者心大心大者謂發阿耨多羅三藐三菩提心三者解大解大者解菩薩藏毗佛略經四者淨大淨大者菩薩發心已其心清淨乃至得阿耨多羅三藐三菩提五者莊嚴大莊嚴大者菩薩具足功德莊嚴智慧莊嚴得阿耨多羅三藐三菩提六者時大時大者菩薩摩訶薩為阿耨多羅三藐三菩提故三阿僧祇劫修行苦行七者具足大具足大者菩薩具足三十二相八十種好以自莊嚴得阿耨多羅三藐三菩提法大心大解大淨大莊嚴大時大如是六大名之為因具足大者名之為果有八法能攝一切大乘一者演説菩薩法藏説菩薩藏義説菩薩藏中諸佛菩薩不可思議思惟其義修集其義得具足義得修集果解甚深義是名為八菩薩摩訶薩如是學者得阿耨多羅三藐三菩提菩薩修學菩薩菩提有十種一者性住二者入三者不淨心四者淨心五者不熟六者熟七者不定八者定九者一生得十者現身得定性淨心學諸法是名為住發阿耨多羅三藐三菩提心是名為入入者未得淨地名為不淨得淨地已是名為淨淨者未入畢竟地時名為未熟入畢竟地名之為熟熟者未入定地名為不定已入定地名之為定熟有二種一者一生得阿耨多羅三藐三菩提二者現身得阿耨多羅三藐三菩提如是十種菩薩摩訶薩能受菩薩戒行菩薩戒是十種菩薩攝一切菩薩若能至心受持修行菩薩戒者是名菩薩是名摩訶薩是名智者是名勇健是名上仙是名佛子是名佛持是名大勝是名佛戒是名無畏是名大聖是名商主是名船師是名大名稱是名憐愍是名大功德是名自在是名法持是名不可思議是名能知十方無量世界如觀掌中阿摩勒果若有人言我是菩薩不受菩薩戒不能至心行菩薩戒然生信心當知是菩薩欲得阿耨多羅三藐三菩提若有人言我是菩薩不能至心受持菩薩戒心不生信是名名字菩薩久久乃得阿耨多羅三藐三菩提若有人言我是菩薩受持菩薩戒至心修行信菩薩戒是名入十種菩薩中不久定得阿耨多羅三藐三菩提若有人言我是菩薩受菩薩戒不能至心護持禁戒毀破所受心不生信是名菩薩栴陀羅不名名菩薩不名義菩薩如法住菩薩相品第一真實菩薩有五種相菩薩具足五種相故名真實菩薩一者憐愍心二者柔軟語三者勇健四者不貪五者解説深義如是五法有五種智一者性二者因緣三者功德果四者次第五者攝取憐愍性者有二種一者至心二者如法至心者施衆安隱是名為性如法者菩薩摩訶薩如已樂事以施衆生是名如法柔軟性者先意語歡喜語遠惡語利益語是名柔軟性勇健性者心無所畏猛健果敢能破衆生畏懼之想是名健性不貪性者一切施一切施一切施清淨施施已無悔是名不貪性解説深義性者四無礙智是名解説深義性憐愍者有五因緣一者受苦衆生二者行惡衆生三者放逸衆生四者邪見衆生五者樂煩惱衆生受苦衆生者常受苦惱乃至無有一念之樂是名受苦又有衆生雖不受苦造身口意十惡業道如十六惡律儀是名行惡衆生復有衆生不行惡業不受苦惱貪著五欲耽樂嬉戲貪愛己身不修善法是名放逸復有衆生不受苦惱不行惡業亦不放逸為求解脫非因見因非果見果是名邪見如外道等復有衆生不受苦惱不行惡業亦不放逸亦不邪見具煩惱繫煩惱障故不修善法是名憐愍因緣以是因緣憐愍之心遂得增長柔軟因緣者有五種一者善先語二者善喜語三者善無畏語四者善淨語五者善教語此五因緣是名柔軟語如四攝品中説勇健因緣者有五種如上三十七助菩提品中説不貪者有五因緣一者不分別施二者喜施三者至心施四者淨施五者如法得財施是名不貪五因緣如施品説説甚深義有五因緣一者説修多羅甚深之義解説空義三世中陰退不退我我所佛性菩薩性如來涅槃三乘色造色十二因緣是名修多羅義二者能説毗尼義是犯是非犯是可悔是不可悔是輕是重是性重是遮重是名説毗尼甚深義三者説摩夷義佛爾時為衆生故説名為犯為他故説輕作重説重作輕為令一人得懺悔故乃至大衆中得懺悔故是名説摩夷甚深義四者能自解説正義五者能知諸法名字憐愍功德果者菩薩慈心為諸衆生壞惡心故修集慈心能利衆生心無悔恨常修集故得現世樂是故如來説慈功果毒不能害刀不能傷眠無惡夢諸天擁護捨此身已得生初禪是名憐愍功德果柔軟語功德果者菩薩摩訶薩修柔軟語能破現在口四惡過是柔軟語自利利他能令衆生愛樂喜聞是名柔軟語功德果勇健功德果者菩薩現在能破懈怠受歡喜樂樂於寂靜護持禁戒心無悔恨自修忍辱教人行忍修諸苦行莊嚴菩提心無退轉是名勇健功德果不貪解説深義二功德果如上所説次第者菩薩摩訶薩先修慈心為調衆生故次説軟語為破惡業故見諸衆生受惡業者心不怖畏生救護故名為勇健為調衆生故行惠施次説不貪及以深義菩薩摩訶薩隨是五相攝六波羅蜜憐愍相者攝禪波羅蜜柔軟語者攝尸波羅蜜般若波羅蜜勇健相者攝毗梨耶波羅蜜羼提波羅蜜般若波羅蜜不貪者攝檀波羅蜜説甚深義攝般若波羅蜜檀波羅蜜如法住禪品第二菩薩摩訶薩若在家若出家俱有四法有能修學即得阿耨多羅三藐三菩提行善業方便憐愍衆生善業方便者為施波羅蜜故修善行專心行常行淨行善行者菩薩若有財物施乞者時不觀有恩不觀無恩不觀福田及非福田雖有人天沙門婆羅門不能沮壞菩薩施心是名善行專心行者菩薩施時有來求者捨內外物一切施與心無貪吝是名專心施常行者菩薩施時有來乞者不觀時與非時隨得隨施是名常行淨行者菩薩施時有來乞者不以名譽故施非為天樂故施如施品中説是名淨行如施四事尸波羅蜜羼提波羅蜜毗梨耶波羅蜜禪波羅蜜般若波羅蜜亦復如是云何菩薩善方便若有生心欲破佛法為調伏故行善方便欲令中人入佛法故行善方便雖入未熟為令熟故行善方便入已既熟令得解脫故行善方便菩薩為説世間醫方技術諸論行善方便為欲至心受菩薩戒堅持不毀故行善方便善願方便聲聞乘方便辟支佛乘方便大乘方便此十方便能作五事初四方便為利益衆生行世術方便為破邪論菩薩受持菩薩禁戒終不毀犯設犯隨懺善發願方便隨所欲事即能得之菩薩三乘方便隨根説法是故菩薩如是十種方便能作五事以五事故具足必定能得世間一切之事若現在若他世云何菩薩利益於他如四攝品中説云何菩薩善發願菩薩所作一切善業若過去未來現在不求餘果唯求無上菩提道果是名善發願如來若為出家在家説戒一切攝取如是四事若出家在家菩薩若過去未來現在受持菩薩戒悉得阿耨多羅三藐三菩提出家菩薩勝於在家何以故出家菩薩獲得一切菩薩禁戒在家菩薩不得菩薩一切禁戒出家菩薩能行寂靜清淨梵行在家菩薩不能修行寂靜梵行出家菩薩能行三十七品在家菩薩不能修行三十七品出家菩薩解脫一切世間之事在家菩薩為世間事之所繫縛
