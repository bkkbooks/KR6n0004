  - {type: variant, offset: 1434, length: 114, content: 性行時，是菩薩行十二行及如來行因，雖是諸行因，亦未得異行，何況如來行，亦未得因、亦未得果、亦未得淨。若得一行，是名解行，是名行如來行。亦未得如來行、未淨如來行，名為得解行淨解行。以淨解行故得喜行淨喜行，喜行淨故得戒行淨戒行＝戒行淨故【聖】淨戒行【大】，戒行淨故【聖】淨戒行戒行淨故，如是乃至十二行是名＝能得【聖】是名【大】，能得【聖】是名能得菩薩行。具足菩薩行淨, 宋: 十行是如來行因中所行亦未得果亦未得淨亦欲得如來十一行若行一行如來行名為行行淨行行以淨行故名為喜行欲淨喜行喜行淨故得戒行戒行淨故乃至能得菩薩行具足, 元: 十行是如來行因中所行亦未得果亦未得淨亦欲得如來十一行若行一行如來行名為行行淨行行以淨行故名為喜行欲淨喜行喜行淨故得戒行戒行淨故乃至能得菩薩行具足, 明: 十行是如來行因中所行亦未得果亦未得淨亦欲得如來十一行若行一行如來行名為行行淨行行以淨行故名為喜行欲淨喜行喜行淨故得戒行戒行淨故乃至能得菩薩行具足}
