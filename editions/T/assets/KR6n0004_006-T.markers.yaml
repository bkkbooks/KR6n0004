  - {type: punctuation, offset: 2793, content: 。, id: KR6n0004_T_006-bkkpn370}
  - {type: variant, offset: 2793, length: 341, content: 復有九種：一者一切苦；二者大苦；三者一切自苦；四者不如法住苦；五者轉苦；六者不得自在苦；七者害苦；八者隨逐苦；九者一切行苦。一切苦者，由往昔因得現在苦。大苦者，如諸眾生無量世中受地獄苦。一切自苦者，如地獄畜生餓鬼人天中苦。不如法住苦者，如作謀議欲害於他，事不成就反受其禍，如貪飲食後受大苦，如念貪欲瞋恚癡苦，如因身口意惡業受苦，如因毀戒受於憂苦。轉苦者，如現在王身轉至他世為奴僕苦，如現父母兄弟妻子轉至他世為怨憎苦，如現在巨富轉至他世受貧窮苦。不得自在苦者，如欲得長命、欲得端正、欲得上族、欲得富貴、欲得身力＝刀【元】力【大】，刀【元】力刀、欲得智慧、欲除怨敵，不得如意苦。害苦者，如世中人求破貧窮不能破苦、出家之人求壞煩惱不能壞苦，如事難苦、兵革起苦、行曠路苦、截手脚苦、閉繫打縛苦、驅擯出外苦。一切行苦者，因苦受苦、離樂受苦，一切諸受未斷故苦、不能出家苦、不能寂靜苦、不得菩提苦、多生思覺苦、凡夫苦、四大苦、三界苦、煩惱苦, 聖: 如觀自身五十五苦觀他身苦亦復如是}
